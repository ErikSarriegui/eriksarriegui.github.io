<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Fuentes de Madrid</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Reseteo de márgenes y fuente moderna */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Mapa a pantalla completa */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Tarjeta flotante moderna */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            min-width: 280px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 {
            margin: 0 0 10px 0;
            color: #1a73e8;
            font-size: 22px;
        }

        #status {
            font-size: 15px;
            color: #444;
            margin-bottom: 15px;
            font-weight: 500;
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
        }

        button:hover {
            background-color: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(26, 115, 232, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Ajuste para el botón dentro del popup para que no se vea gigante */
        .popup-btn {
            padding: 8px 16px;
            font-size: 13px;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <h2>💧 Fuentes de Madrid</h2>
        <div id="status">Solicitando tu ubicación...</div>
        <button id="recenter-btn">📍 Centrar en mí</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Inicializamos el mapa
        const map = L.map('map').setView([40.4168, -3.7038], 17);

        // Capa de CartoDB
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO',
            maxZoom: 20
        }).addTo(map);

        let userMarker, closestMarker;
        const fountainMarkers = [];
        let rutaLayer = null; // Variable para guardar la línea de la ruta
        let currentLat = 40.4168;
        let currentLon = -3.7038;

        // Función de inicio automático
        function initApp() {
            const statusDiv = document.getElementById('status');
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLon = position.coords.longitude;
                        procesarUbicacion(currentLat, currentLon, "Ubicación encontrada. Buscando fuentes...");
                    },
                    (error) => {
                        console.warn("No se pudo obtener la ubicación:", error);
                        statusDiv.innerText = "Ubicación denegada. Mostrando el centro.";
                        procesarUbicacion(currentLat, currentLon, "Mostrando fuentes del centro.");
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                statusDiv.innerText = "Tu navegador no soporta GPS.";
                procesarUbicacion(currentLat, currentLon, "Mostrando fuentes del centro.");
            }
        }

        document.getElementById('recenter-btn').addEventListener('click', () => {
            if (rutaLayer) {
                map.removeLayer(rutaLayer); // Limpiamos la ruta si recentramos
            }
            initApp();
        });

        function procesarUbicacion(lat, lon, mensaje) {
            document.getElementById('status').innerText = mensaje;
            map.setView([lat, lon], 17);

            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([lat, lon], {
                radius: 8,
                fillColor: "#00c853",
                color: "#ffffff",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>¡Estás aquí!</b>");

            buscarFuentes(lat, lon);
        }

        function buscarFuentes(lat, lon) {
            const query = `[out:json][timeout:15];node["amenity"="drinking_water"](around:1000,${lat},${lon});out body;`;
            const url = `https://lz4.overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`Error: ${response.status}`);
                return response.json();
            })
            .then(data => {
                limpiarMarcadores();
                
                if (!data.elements || data.elements.length === 0) {
                    document.getElementById('status').innerText = "No hay fuentes a menos de 1km.";
                    return;
                }

                let fuenteMasCercana = null;
                let distanciaMinima = Infinity;

                data.elements.forEach(fuente => {
                    const fLat = fuente.lat;
                    const fLon = fuente.lon;
                    const distancia = map.distance([lat, lon], [fLat, fLon]);

                    if (distancia < distanciaMinima) {
                        distanciaMinima = distancia;
                        fuenteMasCercana = { lat: fLat, lon: fLon, dist: distancia };
                    }

                    const marker = L.circleMarker([fLat, fLon], {
                        radius: 6,
                        fillColor: "#1a73e8",
                        color: "#ffffff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);
                    fountainMarkers.push(marker);
                });

                if (fuenteMasCercana) {
                    // Añadimos el botón "Cómo llegar" dentro del popup llamando a la nueva función
                    const popupContent = `
                        <div style="text-align: center;">
                            <b>💧 Fuente más cercana</b><br>
                            A ${Math.round(fuenteMasCercana.dist)} metros de ti.<br>
                            <button class="popup-btn" onclick="trazarRuta(${fuenteMasCercana.lat}, ${fuenteMasCercana.lon})">🚶 Cómo llegar</button>
                        </div>
                    `;

                    closestMarker = L.marker([fuenteMasCercana.lat, fuenteMasCercana.lon])
                        .addTo(map)
                        .bindPopup(popupContent)
                        .openPopup();
                    
                    document.getElementById('status').innerText = `La fuente más cercana está a ${Math.round(fuenteMasCercana.dist)} metros.`;
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = `Error al descargar las fuentes.`;
                console.error(err);
            });
        }

        // NUEVA FUNCIÓN: Traza la ruta usando OSRM
        function trazarRuta(destLat, destLon) {
            // Si ya hay una ruta pintada, la borramos
            if (rutaLayer) {
                map.removeLayer(rutaLayer);
            }

            document.getElementById('status').innerText = "Calculando ruta a pie...";

            // Hacemos la petición a la API gratuita de OSRM con el perfil de peatón ("foot")
            // Nota: OSRM usa el formato longitud,latitud (¡al revés que Leaflet!)
            const osrmUrl = `https://router.project-osrm.org/route/v1/foot/${currentLon},${currentLat};${destLon},${destLat}?overview=full&geometries=geojson`;

            fetch(osrmUrl)
            .then(response => response.json())
            .then(data => {
                if (data.routes && data.routes.length > 0) {
                    // Extraemos la geometría de la ruta
                    const rutaGeoJSON = data.routes[0].geometry;

                    // Dibujamos la línea en el mapa
                    rutaLayer = L.geoJSON(rutaGeoJSON, {
                        style: {
                            color: '#1a73e8', // Azul a juego con la app
                            weight: 5,
                            opacity: 0.8,
                            dashArray: '10, 10' // Hacemos que sea una línea punteada para indicar "a pie"
                        }
                    }).addTo(map);

                    // Ajustamos el zoom y la posición para que se vea toda la ruta en pantalla
                    map.fitBounds(rutaLayer.getBounds(), { padding: [50, 50] });
                    document.getElementById('status').innerText = "¡Sigue la línea punteada!";
                    
                    // Cerramos el popup para dejar ver bien la ruta
                    closestMarker.closePopup();
                } else {
                    document.getElementById('status').innerText = "No se encontró una ruta a pie.";
                }
            })
            .catch(err => {
                console.error("Error al calcular la ruta: ", err);
                document.getElementById('status').innerText = "Error al calcular la ruta.";
            });
        }

        function limpiarMarcadores() {
            fountainMarkers.forEach(m => map.removeLayer(m));
            fountainMarkers.length = 0;
            if (closestMarker) map.removeLayer(closestMarker);
        }

        // ¡Arrancamos!
        initApp();
    </script>
</body>
</html>

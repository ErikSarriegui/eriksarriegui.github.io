<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Fuentes de Madrid</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        #ui-panel {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            min-width: 300px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 { margin: 0 0 10px 0; color: #1a73e8; font-size: 22px; }
        #status { font-size: 15px; color: #444; margin-bottom: 15px; font-weight: 500; }

        .btn-container { display: flex; gap: 10px; justify-content: center; }

        button {
            background-color: #1a73e8; color: white; border: none;
            padding: 12px 20px; font-size: 14px; font-weight: bold;
            border-radius: 30px; cursor: pointer; transition: all 0.2s ease;
        }

        /* Estilo para el botón de cancelar (Rojo) */
        #cancel-btn {
            background-color: #ea4335;
            display: none; /* Oculto por defecto */
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .popup-btn {
            padding: 8px 12px; font-size: 12px; margin-top: 8px;
            width: 100%; background-color: #34a853;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <h2>💧 Fuentes de Madrid</h2>
        <div id="status">Buscando ubicación...</div>
        <div class="btn-container">
            <button id="recenter-btn">📍 Mi ubicación</button>
            <button id="cancel-btn">❌ Cancelar ruta</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map').setView([40.4168, -3.7038], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO', maxZoom: 20
        }).addTo(map);

        let userMarker, rutaLayer;
        const fountainMarkers = [];
        let currentLat, currentLon;

        const statusDiv = document.getElementById('status');
        const cancelBtn = document.getElementById('cancel-btn');

        function initApp() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLon = position.coords.longitude;
                        procesarUbicacion(currentLat, currentLon, "Fuentes encontradas cerca de ti");
                    },
                    () => {
                        statusDiv.innerText = "Usando ubicación predeterminada (Madrid Centro).";
                        currentLat = 40.4168; currentLon = -3.7038;
                        procesarUbicacion(currentLat, currentLon, "Mostrando centro de Madrid");
                    }
                );
            }
        }

        function procesarUbicacion(lat, lon, mensaje) {
            statusDiv.innerText = mensaje;
            map.setView([lat, lon], 17);

            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([lat, lon], {
                radius: 9, fillColor: "#00c853", color: "#ffffff", weight: 3, fillOpacity: 1
            }).addTo(map).bindPopup("<b>Estás aquí</b>");

            buscarFuentes(lat, lon);
        }

        function buscarFuentes(lat, lon) {
            const query = `[out:json];node["amenity"="drinking_water"](around:1000,${lat},${lon});out body;`;
            fetch(`https://lz4.overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                limpiarFuentes();
                data.elements.forEach(f => {
                    const dist = Math.round(map.distance([lat, lon], [f.lat, f.lon]));
                    
                    // Ahora todas las fuentes tienen su propio popup con botón
                    const marker = L.circleMarker([f.lat, f.lon], {
                        radius: 7, fillColor: "#1a73e8", color: "#fff", weight: 2, fillOpacity: 0.8
                    }).addTo(map);

                    const popupCont = `
                        <div style="text-align:center">
                            <b>💧 Fuente</b><br>A ${dist} metros<br>
                            <button class="popup-btn" onclick="trazarRuta(${f.lat}, ${f.lon})">🚶 Ir aquí</button>
                        </div>
                    `;
                    marker.bindPopup(popupCont);
                    fountainMarkers.push(marker);
                });
            });
        }

        function trazarRuta(destLat, destLon) {
            if (rutaLayer) map.removeLayer(rutaLayer);

            document.getElementById('status').innerText = "Calculando ruta óptima...";

            // Añadimos 'radiuses=50;50' para que el algoritmo sea más flexible al "pegarse" a las calles
            // y no te obligue a dar vueltas innecesarias si el GPS no es exacto.
            const url = `https://router.project-osrm.org/route/v1/foot/${currentLon},${currentLat};${destLon},${destLat}?overview=full&geometries=geojson&radiuses=50;50`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.code !== 'Ok') {
                    document.getElementById('status').innerText = "No se encontró un camino a pie.";
                    return;
                }

                if (data.routes && data.routes.length > 0) {
                    rutaLayer = L.geoJSON(data.routes[0].geometry, {
                        style: { 
                            color: '#1a73e8', 
                            weight: 6, 
                            opacity: 0.8, 
                            dashArray: '10, 10',
                            lineCap: 'round' // Suaviza las esquinas de la ruta
                        }
                    }).addTo(map);
                    
                    map.fitBounds(rutaLayer.getBounds(), { padding: [50, 50] });
                    
                    const distancia = Math.round(data.routes[0].distance);
                    
                    statusDiv.innerText = `A pie: ${distancia}m. ¡Sigue la ruta azul!`;
                    
                    cancelBtn.style.display = "block";
                    map.closePopup();
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status').innerText = "Error de conexión con el servicio de rutas.";
            });
        }

        // FUNCIÓN PARA CANCELAR LA RUTA
        function cancelarRuta() {
            if (rutaLayer) {
                map.removeLayer(rutaLayer);
                rutaLayer = null;
            }
            cancelBtn.style.display = "none"; // OCULTAR botón
            statusDiv.innerText = "Selecciona una fuente para ver la ruta.";
            map.setView([currentLat, currentLon], 17); // Volver a la vista del usuario
        }

        function limpiarFuentes() {
            fountainMarkers.forEach(m => map.removeLayer(m));
            fountainMarkers.length = 0;
        }

        // Listeners
        document.getElementById('recenter-btn').onclick = () => {
            cancelarRuta();
            initApp();
        };
        
        cancelBtn.onclick = cancelarRuta;

        initApp();
    </script>
</body>
</html>
